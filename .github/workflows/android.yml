name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # We don't cache gradle here because we are using the system version
          
      # We use 'gradle' (system-wide) instead of './gradlew' (local file)
      # This completely bypasses "Permission Denied" or "Usage" errors.
      - name: Build Debug APK with System Gradle
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PetrolQuotaMM-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Optional: Build Release APK
      - name: Build Release APK (unsigned)
        run: gradle assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PetrolQuotaMM-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
